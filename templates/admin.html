<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考核记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6fa; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 22px; margin-bottom: 20px; }
        .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        h2 { font-size: 16px; margin-bottom: 10px; color: #1a1a2e; border-bottom: 2px solid #e94560; padding-bottom: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #555; }
        .btn { display: inline-block; padding: 6px 14px; background: #e94560; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none; margin: 4px 2px; }
        .btn:hover { background: #d63851; }
        .nav { margin-bottom: 16px; }
        .day-nav { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
        .day-nav a { padding: 4px 10px; background: #eee; border-radius: 4px; text-decoration: none; color: #333; font-size: 13px; }
        .day-nav a:hover { background: #ddd; }
        .day-nav a.active { background: #e94560; color: #fff; }
        .correct { color: #16a34a; font-weight: 600; }
        .wrong { color: #dc2626; font-weight: 600; }
        .info { color: #888; font-size: 13px; }
        #loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="/quiz?day=1" class="btn">答题</a>
        <a href="/admin" class="btn" style="background:#1a1a2e;">统计看板</a>
    </div>

    <h1>考核统计看板</h1>

    <div class="card">
        <h2>选择日期</h2>
        <div class="day-nav" id="day-nav"></div>
    </div>

    <div class="card" id="stats-card">
        <h2>完成概况</h2>
        <div id="stats-content"><p class="info">加载中...</p></div>
    </div>

    <div class="card">
        <h2>答题明细</h2>
        <div id="detail-content"><p class="info">加载中...</p></div>
    </div>
</div>

<script>
let currentDay = 1;

async function loadDays() {
    const resp = await fetch("/api/stats/days");
    const days = await resp.json();
    const nav = document.getElementById("day-nav");
    nav.innerHTML = days.map(d => `<a href="#" class="${d === currentDay ? 'active' : ''}" onclick="selectDay(${d})">第${d}天</a>`).join("");
    if (days.length > 0) { currentDay = days[0]; loadStats(); }
}

async function selectDay(day) {
    currentDay = day;
    document.querySelectorAll(".day-nav a").forEach(a => a.classList.remove("active"));
    document.querySelectorAll(".day-nav a").forEach(a => { if (a.textContent.includes(day)) a.classList.add("active"); });
    loadStats();
}

async function loadStats() {
    document.getElementById("stats-content").innerHTML = '<p class="info">加载中...</p>';
    document.getElementById("detail-content").innerHTML = '<p class="info">加载中...</p>';

    const resp = await fetch("/api/stats/day?day=" + currentDay);
    const data = await resp.json();

    const total = data.total_users || 0;
    const answered = data.answered_users || 0;
    const pct = total > 0 ? (answered / total * 100).toFixed(1) : 0;
    const rate = data.correct_rate ? data.correct_rate.toFixed(1) : 0;

    document.getElementById("stats-content").innerHTML = `
        <table>
            <tr><th>指标</th><th>数值</th></tr>
            <tr><td>应考人数</td><td>${total}</td></tr>
            <tr><td>已答人数</td><td>${answered}</td></tr>
            <tr><td>完成率</td><td>${pct}%</td></tr>
            <tr><td>平均正确率</td><td>${rate}%</td></tr>
        </table>
    `;

    const users = data.users || [];
    if (users.length === 0) {
        document.getElementById("detail-content").innerHTML = '<p class="info">暂无答题记录</p>';
        return;
    }
    document.getElementById("detail-content").innerHTML = `
        <table>
            <tr><th>姓名</th><th>部门</th><th>状态</th><th>得分</th><th>正确率</th></tr>
            ${users.map(u => {
                const r = u.total > 0 ? (u.correct / u.total * 100).toFixed(0) : 0;
                const cls = r >= 80 ? "correct" : r >= 60 ? "" : "wrong";
                return `<tr><td>${u.name}</td><td>${u.dept || "-"}</td><td>${u.total > 0 ? '已答' : '未答'}</td><td>${u.correct}/${u.total}</td><td class="${cls}">${r}%</td></tr>`;
            }).join("")}
        </table>
    `;
}

loadDays();
</script>
</body>
</html>
